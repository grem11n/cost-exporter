---
name: Unit Tests
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'charts/**/*'
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    paths-ignore:
      - '**.md'
      - 'charts/**/*'

permissions: read-all
jobs:
  build:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '>=1.23.8'
      - name: Install Richgo
        run: |
          go install github.com/kyoh86/richgo@latest

      - name: Run Tests
        run: |
          #!/bin/bash
          set -e
          set -x
          go mod tidy
          richgo test -v ./...
